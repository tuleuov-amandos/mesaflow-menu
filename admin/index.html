<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Painel de Pedidos — MesaFlow</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/styles/variables.css" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
  <main class="admin">
    <section id="loginView" class="login" hidden>
      <form id="loginForm" class="login__card" autocomplete="off">
        <h1 class="login__title">MesaFlow</h1>
        <p class="login__subtitle">Painel de Pedidos</p>
        <label class="login__label" for="password">Senha de acesso</label>
        <input class="login__input" type="password" id="password" name="password" required />
        <button class="btn btn--primary" type="submit" id="loginBtn">Entrar</button>
        <p class="login__error" id="loginError" role="alert" hidden></p>
      </form>
    </section>

    <section id="panelView" class="panel" hidden>
      <header class="panel__top">
        <div class="panel__heading">
          <p class="panel__eyebrow">Painel de pedidos</p>
          <h1 class="panel__title">Beco da Chapa</h1>
          <p class="panel__support">Acompanhe novos pedidos e atualize o preparo.</p>
        </div>
        <div class="panel__actions">
          <button class="btn btn--ghost" type="button" id="logoutBtn">Sair</button>
          <p class="panel__update" id="lastUpdate"></p>
          <p class="panel__signature">Tecnologia <span>MesaFlow</span></p>
        </div>
      </header>

      <div class="summary">
        <div class="summary__card summary__card--novos"><span class="summary__num" id="cardNovos">0</span><span class="summary__lbl">Novos</span></div>
        <div class="summary__card summary__card--preparo"><span class="summary__num" id="cardPreparo">0</span><span class="summary__lbl">Em preparo</span></div>
        <div class="summary__card summary__card--finalizados"><span class="summary__num" id="cardFinalizados">0</span><span class="summary__lbl">Finalizados</span></div>
      </div>

      <div class="filters">
        <div class="filters__field">
          <svg class="filters__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8" />
            <path d="m20 20-3.2-3.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          </svg>
          <input class="filters__search" type="search" id="searchInput" placeholder="Buscar por código, nome ou telefone" />
        </div>
        <select class="filters__status" id="statusFilter">
          <option value="">Todos os status</option>
          <option value="NEW">Novo</option>
          <option value="CONFIRMED">Confirmado</option>
          <option value="PREPARING">Em preparo</option>
          <option value="READY">Pronto</option>
          <option value="DELIVERED">Finalizado</option>
          <option value="CANCELED">Cancelado</option>
        </select>
      </div>

      <div class="empty" id="ordersEmpty" hidden>
        <span class="empty__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="3" width="16" height="18" rx="2.5" stroke="currentColor" stroke-width="1.6" />
            <path d="M8 8h8M8 12h8M8 16h5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
          </svg>
        </span>
        <h2 class="empty__title">Nenhum pedido encontrado</h2>
        <p class="empty__text">Novos pedidos aparecerão aqui assim que forem recebidos.</p>
      </div>
      <ul class="orders" id="ordersList"></ul>
    </section>

    <div class="modal" id="detailModal" hidden>
      <div class="modal__backdrop" data-close></div>
      <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="detailCode">
        <button class="modal__close" type="button" data-close aria-label="Fechar">×</button>
        <div id="detailContent" class="detail"></div>
      </div>
    </div>
  </main>
  <script type="module" src="/admin/admin.js"></script>
</body>
</html>
